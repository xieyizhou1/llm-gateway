version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/config.yaml
      - LG_VIRTUAL_KEY_TEAM_A=${LG_VIRTUAL_KEY_TEAM_A}
      - KIMI_KEY_1=${KIMI_KEY_1}
      - DEEPSEEK_KEY_1=${DEEPSEEK_KEY_1}
    depends_on:
      - redis
    volumes:
      - ./config.yaml:/app/config.yaml:ro

volumes:
  redis-data:
