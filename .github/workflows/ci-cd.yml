name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        type: choice
        options:
          - staging
          - production
        required: true
        default: staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: go build -o llm-gateway ./cmd/gateway

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-gateway-binary
          path: llm-gateway

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: llm-gateway-binary
          path: ./dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PATH: ${{ secrets.STAGING_PATH }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          rsync -avz --delete -e "ssh ${SSH_OPTS}" ./dist/llm-gateway "${STAGING_USER}@${STAGING_HOST}:${STAGING_PATH}/llm-gateway.new"
          ssh ${SSH_OPTS} "${STAGING_USER}@${STAGING_HOST}" <<'REMOTE'
            set -e
            cd "${STAGING_PATH}"
            pm2 stop llm-gateway || true
            mv llm-gateway.new llm-gateway
            chmod +x llm-gateway
            pm2 start ecosystem.config.cjs
            pm2 save
          REMOTE

  verify-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always() && needs.deploy-staging.result == 'success'
    steps:
      - name: Smoke test
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          if [ -z "$STAGING_URL" ]; then
            echo "STAGING_URL not set, skipping"
            exit 0
          fi
          curl -fsS "${STAGING_URL}/health" > /dev/null

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: llm-gateway-binary
          path: ./dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          rsync -avz --delete -e "ssh ${SSH_OPTS}" ./dist/llm-gateway "${PROD_USER}@${PROD_HOST}:${PROD_PATH}/llm-gateway.new"
          ssh ${SSH_OPTS} "${PROD_USER}@${PROD_HOST}" <<'REMOTE'
            set -e
            cd "${PROD_PATH}"
            pm2 stop llm-gateway || true
            cp llm-gateway "llm-gateway.bak.$(date +%Y%m%d-%H%M%S)"
            mv llm-gateway.new llm-gateway
            chmod +x llm-gateway
            pm2 start ecosystem.config.cjs
            pm2 save
          REMOTE

  verify-production:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success'
    steps:
      - name: Smoke test
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          if [ -z "$PROD_URL" ]; then
            echo "PROD_URL not set, skipping"
            exit 0
          fi
          curl -fsS "${PROD_URL}/health" > /dev/null
